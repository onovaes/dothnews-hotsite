version: 2
updates:
  # Dependências npm da landing
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      # Agrupa atualizações de produção num único PR para reduzir ruído
      producao:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # Agrupa dev/build (vite, tailwind, sass, postcss, etc.)
      desenvolvimento:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Atualizações das próprias GitHub Actions usadas nos workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
