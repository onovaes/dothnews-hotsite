    <link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/fonts/material-symbols-outlined.woff2" />
    <script>
      document.documentElement.classList.add('js')
      // Revela os ícones só quando as fontes estiverem prontas (evita flash da ligadura crua).
      // Fallback por timeout garante visibilidade mesmo se fonts.ready não resolver.
      ;(function () {
        var reveal = function () { document.documentElement.classList.add('fonts-ready') }
        if (document.fonts && document.fonts.ready) {
          document.fonts.ready.then(reveal)
        }
        setTimeout(reveal, 3000)
      })()
    </script>
